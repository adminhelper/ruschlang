name: CI 검증

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend:
    name: 프론트엔드 검증
    runs-on: ubuntu-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 의존성 설치
        working-directory: frontend
        run: npm ci

      - name: TypeScript 타입 검사
        working-directory: frontend
        run: npx tsc --noEmit

      - name: 프로덕션 빌드
        working-directory: frontend
        env:
          GITHUB_PAGES: 'true'
        run: npm run build
