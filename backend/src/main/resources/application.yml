server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3307/ruschlang?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: root
    password: ${SPRING_DATASOURCE_PASSWORD:ruschlang_root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

naver:
  search:
    client-id: ${NAVER_SEARCH_CLIENT_ID}
    client-secret: ${NAVER_SEARCH_CLIENT_SECRET}
  map:
    client-id: ${NAVER_MAP_CLIENT_ID}

admin:
  token: ${ADMIN_TOKEN}
